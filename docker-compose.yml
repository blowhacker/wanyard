services:
  emulator:
    build:
      context: ./emulator
    container_name: eufy-emulator
    ports:
      - "6080:6080"
      - "5555:5555"
    volumes:
      - emulator-data:/avd

  app:
    build: .
    image: eufy-snapshot:latest
    container_name: eufy-snapshot
    depends_on:
      - emulator
    command: ["-c", "/app/config.yaml", "serve"]
    ports:
      - "8091:8091"
    volumes:
      - ./config.compose.yaml:/app/config.yaml:ro
      - ./snapshots:/app/snapshots
      - ./data:/app/data

volumes:
  emulator-data:
