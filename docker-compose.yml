services:
  emulator:
    image: budtmo/docker-android:emulator_14.0
    container_name: eufy-emulator
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    environment:
      EMULATOR_DEVICE: "Pixel 8"
      WEB_VNC: "true"
      WEB_VNC_PORT: "6080"
      EMULATOR_ADDITIONAL_ARGS: "-no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect"
    ports:
      - "6080:6080"
      - "5555:5555"
    volumes:
      - emulator-data:/root/.android

  app:
    build: .
    image: eufy-snapshot:latest
    container_name: eufy-snapshot
    depends_on:
      - emulator
    command: ["-c", "/app/config.yaml", "serve"]
    ports:
      - "8091:8091"
    volumes:
      - ./config.compose.yaml:/app/config.yaml:ro
      - ./snapshots:/app/snapshots

volumes:
  emulator-data:
