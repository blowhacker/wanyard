services:
  yolo:
    image: eufy-snapshot:latest
    container_name: eufy-yolo
    restart: unless-stopped
    command: ["-c", "/app/config.yaml", "yolo-serve"]
    environment:
      - YOLO_MODEL_PATH=/app/models/yolo11m.pt
      - VIDEO_DIR=/app/video
      - YOLO_SOCKET=/run/yolo/yolo.sock
    volumes:
      - ./config.banana.yaml:/app/config.yaml:ro
      - ./models:/app/models
      - ./video:/app/video
      - yolo-run:/run/yolo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    image: eufy-snapshot:latest
    container_name: eufy-snapshot
    restart: unless-stopped
    command: ["-c", "/app/config.yaml", "serve"]
    ports:
      - "8091:8091"
    environment:
      - VIDEO_DIR=/app/video
      - YOLO_SOCKET=/run/yolo/yolo.sock
    volumes:
      - ./config.banana.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./video:/app/video
      - yolo-run:/run/yolo

volumes:
  yolo-run:
