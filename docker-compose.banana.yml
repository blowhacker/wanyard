services:
  yolo:
    image: wanyard:latest
    container_name: wanyard-yolo
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "3"}
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket,json; s=socket.socket(socket.AF_UNIX); s.settimeout(2); s.connect('/run/yolo/yolo.sock'); s.sendall(b'{\"type\":\"ping\"}\\n'); r=json.loads(s.recv(256)); s.close(); exit(0 if r.get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    command: ["-c", "/app/config.yaml", "yolo-serve"]
    environment:
      - YOLO_MODEL_PATH=/app/models/yolo11m.pt
      - VIDEO_DIR=/app/video
      - YOLO_SOCKET=/run/yolo/yolo.sock
      - CLEANUP_DAYS=30
      # - CLEANUP_MAX_GB=200  # uncomment to also cap by total size
    volumes:
      - ./config.banana.yaml:/app/config.yaml:ro
      - ./models:/app/models
      - ./video:/app/video
      - yolo-run:/run/yolo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    image: wanyard:latest
    container_name: wanyard
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "3"}
    command: ["-c", "/app/config.yaml", "serve"]
    ports:
      - "8091:8091"
    environment:
      - VIDEO_DIR=/app/video
      - YOLO_SOCKET=/run/yolo/yolo.sock
    volumes:
      - ./config.banana.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./video:/app/video
      - yolo-run:/run/yolo

volumes:
  yolo-run:
