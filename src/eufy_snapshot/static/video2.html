<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Video² — Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/video2.css">
  </head>
  <body>
    <div id="v2LoadBar" class="v2-load-bar"></div>
    <main class="viewer v2-viewer">

      <!-- ── Video stage ───────────────────────────── -->
      <section class="image-stage v2-stage">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="hud-top">
          <span id="v2HudSource" class="hud-source"></span>
          <div style="display:flex;align-items:center;gap:10px">
            <a href="/" class="v2-back">← STILLS</a>
            <span class="hud-rec"><span class="rec-dot"></span>REC</span>
          </div>
        </div>
        <video id="v2Video" playsinline></video>
        <canvas id="v2BoxCanvas"></canvas>
        <div id="v2Empty" class="empty">SELECT A MOMENT</div>
        <div class="hud-bottom">
          <span id="v2HudTs" class="hud-ts"></span>
        </div>
        <button id="v2GoLive" class="go-live-btn" hidden>&#9679; LIVE</button>
      </section>

      <!-- ── Panel ─────────────────────────────────── -->
      <aside class="panel">
        <div class="panel-head">
          <span class="panel-brand">VIDEO²</span>
          <div class="panel-head-right">
            <button id="v2LiveBtn" class="live-btn">LIVE</button>
            <div id="v2Status" class="refresh-badge">AUTO</div>
          </div>
        </div>
        <div class="ts-block">
          <div class="ts-label">PLAYING</div>
          <div id="v2Timestamp" class="timestamp">--</div>
        </div>
        <div class="field-block">
          <div class="field">
            <div class="field-label">Source</div>
            <div id="v2SourceCtrl" class="source-ctrl"></div>
          </div>
          <div class="field" id="v2ClassField" hidden>
            <div class="field-label">Class filter</div>
            <div id="v2ClassCtrl" class="class-chips"></div>
          </div>
          <div class="field v2-near-field">
            <div class="v2-near-head">
              <div class="field-label">Nearby events</div>
              <select id="v2NearClass" class="v2-near-select"></select>
            </div>
            <div id="v2EventThumbs" class="v2-event-thumbs"></div>
          </div>
        </div>
      </aside>

      <!-- ── Timeline area ─────────────────────────── -->
      <div class="v2-timeline-area">
        <!-- Controls bar -->
        <div class="filmstrip-bar">
          <div class="fb-transport">
            <button id="v2Prev"   title="Previous clip (←)">&#8249;</button>
            <button id="v2Rewind" class="v2-rewind-btn" title="Rewind 10s">&#8592;10s</button>
            <button id="v2Play"   class="vctr-play" title="Play/Pause (Space)">&#9654;</button>
            <button id="v2Next"   title="Next clip (→)">&#8250;</button>
          </div>
          <div class="fb-play">
            <div id="v2Speeds" class="speed-pills"></div>
            <button id="v2Loop" class="loop-btn active">LOOP</button>
          </div>
          <div class="fb-stats">
            <span id="v2TimeDisp" class="frame-counter"></span>
          </div>
          <div class="fb-filter">
            <button id="v2Boxes" class="humans-btn active" title="Toggle boxes">BOX</button>
          </div>
          <div class="fb-density">
            <button id="v2LoadMore" class="v2-load-more">← +6h</button>
          </div>
        </div>

        <!-- Proportional timeline -->
        <div class="v2-timeline-wrap">
          <canvas id="v2Timeline" class="v2-timeline"></canvas>
          <div id="v2ThumbPreview" class="v2-thumb-preview" hidden>
            <img id="v2ThumbImg" src="" alt="">
            <div id="v2ThumbTs" class="v2-thumb-ts"></div>
          </div>
        </div>
      </div>

    </main>
    <script src="/video2.js"></script>
  </body>
</html>
