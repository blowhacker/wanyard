<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="viewer">

      <!-- ── Image stage ───────────────────────────── -->
      <section class="image-stage">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="hud-top">
          <span id="hudSource" class="hud-source"></span>
          <span class="hud-rec"><span class="rec-dot"></span>REC</span>
        </div>
        <img id="snapshot" alt="Camera snapshot">
        <div id="empty" class="empty">NO SIGNAL</div>
        <div class="hud-bottom">
          <span id="hudTimestamp" class="hud-ts"></span>
        </div>
        <button id="jumpLatest" class="jump-latest" hidden>&#8595; LATEST</button>
      </section>

      <!-- ── Panel (info only) ─────────────────────── -->
      <aside class="panel">
        <div class="panel-head">
          <span class="panel-brand">CCTV</span>
          <div class="panel-head-right">
            <button id="liveBtn" class="live-btn" title="Follow latest frame">LIVE</button>
            <div id="refreshStatus" class="refresh-badge">AUTO</div>
          </div>
        </div>
        <div class="ts-block">
          <div class="ts-label">SELECTED FRAME</div>
          <div id="timestamp" class="timestamp">--</div>
        </div>
        <div class="field-block">
          <div class="field" id="sourceField">
            <div class="field-label">Source</div>
            <div id="sourceCtrl" class="source-ctrl"></div>
            <div id="sourceMeta" class="field-meta"></div>
          </div>
          <div class="field" id="dateField">
            <div class="field-label">Date</div>
            <div id="dateCtrl" class="date-ctrl-wrap"></div>
          </div>
          <details class="field" id="rtspPanel" hidden>
            <summary><span>Add Camera</span></summary>
            <div id="dbSourceList" class="db-source-list"></div>
            <form id="addSourceForm" class="add-source-form" autocomplete="off">
              <input id="newSourceName" type="text" placeholder="Camera name" required>
              <input id="newSourceUrl" type="text" placeholder="rtsp://host/stream" required>
              <div class="add-source-row">
                <input id="newSourceInterval" type="number" placeholder="30s" min="5" step="1">
                <select id="newSourceTransport">
                  <option value="tcp">TCP</option>
                  <option value="udp">UDP</option>
                </select>
                <button type="submit" class="btn-add">ADD</button>
              </div>
              <div id="addSourceError" class="source-error" hidden></div>
            </form>
          </details>
        </div>
        <div id="humansPanel" class="humans-panel" hidden>
          <div class="humans-panel-head">RECENT HUMANS</div>
          <div id="humanGrid" class="human-grid"></div>
        </div>
      </aside>

      <!-- ── Filmstrip area (controls + timeline) ─── -->
      <div class="filmstrip-area">
        <div class="filmstrip-bar">
          <!-- Transport: navigate frames -->
          <div class="fb-transport">
            <button id="prev" title="Previous (←)">&#8249;</button>
            <button id="playBtn" title="Play / Pause (Space)">&#9654;</button>
            <button id="next" title="Next (→)">&#8250;</button>
          </div>
          <!-- Playback modifiers -->
          <div class="fb-play">
            <div id="speedPills" class="speed-pills"></div>
            <button id="loopBtn" class="loop-btn active" title="Toggle loop">LOOP</button>
          </div>
          <!-- Stats -->
          <div class="fb-stats">
            <span id="frameCounter" class="frame-counter"></span>
            <span id="fpsDisplay" class="fps-display"></span>
          </div>
          <!-- Export: in/out + MP4 -->
          <div id="exportField" class="fb-export">
            <button id="inBtn"     class="range-btn" title="Set in-point (I)">[&nbsp;IN</button>
            <button id="outBtn"    class="range-btn" title="Set out-point (O)">OUT&nbsp;]</button>
            <button id="clearRangeBtn" class="range-clear-btn" title="Clear range (Esc)" hidden>✕</button>
            <button id="exportBtn" class="export-btn" title="Export MP4" disabled>MP4</button>
          </div>
          <!-- Filter: humans only -->
          <div id="humansOnlyField" class="fb-filter" hidden>
            <button id="humansOnlyBtn" class="humans-btn" title="Show only frames with humans detected">HUMAN</button>
          </div>
          <!-- Density: controls filmstrip view -->
          <div class="fb-density">
            <div id="densityBtns" class="density-btns"></div>
          </div>
        </div>
        <div id="filmstrip" class="filmstrip" aria-label="Timeline"></div>
      </div>

    </main>
    <script src="/app.js"></script>
  </body>
</html>
