<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Video — Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/video.css">
  </head>
  <body class="video-body">
    <div class="video-layout">

      <!-- ── Sidebar ────────────────────────────────── -->
      <aside class="video-sidebar">
        <div class="video-sidebar-head">
          <a href="/" class="video-back">← SNAPSHOTS</a>
          <span class="video-brand">VIDEO</span>
        </div>

        <!-- Source + Date -->
        <div class="video-filters">
          <div id="videoSourceCtrl" class="video-source-ctrl"></div>
          <div id="videoDateCtrl"   class="date-chips"></div>
        </div>

        <!-- Class chips -->
        <div id="videoClassCtrl" class="video-class-chips"></div>

        <!-- Event list -->
        <div id="videoEventList" class="video-event-list">
          <div class="video-empty-state">No events yet</div>
        </div>
      </aside>

      <!-- ── Main ───────────────────────────────────── -->
      <main class="video-main">
        <div class="video-stage">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="video-hud-top">
            <span id="videoHudSource" class="hud-source"></span>
            <span id="videoHudTime"   class="hud-ts"></span>
          </div>
          <video id="videoPlayer" playsinline></video>
          <canvas id="videoBoxCanvas"></canvas>
          <div id="videoEmpty" class="empty">SELECT AN EVENT</div>
        </div>

        <!-- Scrubber -->
        <div class="video-scrubber-wrap">
          <div id="videoScrubber" class="video-scrubber">
            <div id="videoProgress" class="video-progress"></div>
            <div id="videoHead"     class="video-head"></div>
          </div>
          <div id="videoScrubLabels" class="video-scrub-labels"></div>
        </div>

        <!-- Player controls -->
        <div class="video-controls">
          <button id="videoPrev"  class="vctr-btn" title="Previous event">&#8249;</button>
          <button id="videoPlay"  class="vctr-btn vctr-play" title="Play/Pause">&#9654;</button>
          <button id="videoNext"  class="vctr-btn" title="Next event">&#8250;</button>
          <span   id="videoTime"  class="vctr-time">--:--</span>
          <button id="videoFull"  class="vctr-btn vctr-right" title="Fullscreen">&#9974;</button>
          <div class="vctr-sync" title="Box/video sync offset">
            <button id="syncMinus" class="vctr-sync-btn">−</button>
            <span id="syncLabel" class="vctr-sync-label">BOX</span>
            <button id="syncPlus"  class="vctr-sync-btn">+</button>
          </div>
          <span   id="videoLive"  class="vctr-live-badge" hidden>● LIVE</span>
        </div>
      </main>

    </div>
    <script src="/video.js"></script>
  </body>
</html>
