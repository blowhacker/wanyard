<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Cam Viewer</title>
    <meta name="theme-color" content="#111217">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/video2.css?v=zones-tabs-1">
  </head>
  <body>
    <div id="v2LoadBar" class="v2-load-bar"></div>
    <main class="v2-viewer">
      <header class="appbar">
        <div class="ab-left">
          <div class="ab-logo">C</div>
          <div class="ab-title">Cam Viewer</div>
          <div class="ab-sep"></div>
          <div id="v2SourceCtrl" class="ab-src-pills" role="group" aria-label="Camera source"></div>
        </div>
        <div class="ab-right">
          <div id="v2Status" class="ab-status replay" aria-live="polite">
            <span class="pulse"></span>
            <span data-status-text>REPLAY</span>
          </div>
<a class="ab-icon" href="/settings" title="Settings" aria-label="Settings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.8 3.8l1 1M11.2 11.2l1 1M3.8 12.2l1-1M11.2 4.8l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </a>
        </div>
      </header>

      <section class="image-stage v2-stage">
        <video id="v2Video" playsinline></video>
        <video id="v2LiveVideo" class="v2-live-video" autoplay muted playsinline></video>
        <canvas id="v2BoxCanvas"></canvas>
        <canvas id="v2ZoneCanvas"></canvas>
        <div id="v2Empty" class="empty">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7.5h11.5a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.4"/><path d="m17.5 10 4-2.2v8.4l-4-2.2V10Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="9" cy="12" r="2.1" stroke="currentColor" stroke-width="1.4"/></svg>
          <span id="v2EmptyText">Choose a source to start</span>
          <a id="v2EmptyCta" href="/settings" class="empty-cta" hidden>Add your first camera →</a>
        </div>
        <div class="stage-overlay">
          <div id="v2Timestamp" class="ts-card">
            <span id="v2TsTime">--:--:--</span>
            <span id="v2TsDate" class="sub">--</span>
          </div>
          <div class="stage-tools">
            <button id="v2Boxes" class="st-btn active" type="button" title="Detection boxes" aria-label="Detection boxes">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="3" y="3" width="10" height="10" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/></svg>
            </button>
            <button id="v2Zones" class="st-btn" type="button" title="Activity areas" aria-label="Activity areas">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 5.2 7.7 2.8 13 5.4v5.2L8.2 13.2 3 10.6V5.2Z" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"/><circle cx="8.2" cy="8" r="1.35" fill="currentColor"/></svg>
            </button>
            <button id="v2Fullscreen" class="st-btn" type="button" title="Fullscreen" aria-label="Fullscreen">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 5.5V3h2.5M13 5.5V3h-2.5M3 10.5V13h2.5M13 10.5V13h-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button id="v2DownloadClip" class="st-btn" type="button" title="Download clip" aria-label="Download clip">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3v7M5 7.5l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <div id="v2ZoneBar" class="v2-zone-bar" hidden>
          <div class="v2-zone-meta">
            <input id="v2ZoneName" class="v2-zone-name" type="text" placeholder="Area name" maxlength="80" autocomplete="off">
            <span id="v2ZoneCount">0 areas</span>
          </div>
          <div class="v2-zone-actions compact">
            <button id="v2ZonePrev" class="v2-zone-action icon" type="button" title="Previous area" aria-label="Previous area">‹</button>
            <button id="v2ZoneNext" class="v2-zone-action icon" type="button" title="Next area" aria-label="Next area">›</button>
            <button id="v2ZoneNew" class="v2-zone-action" type="button">New</button>
            <button id="v2ZoneDelete" class="v2-zone-action" type="button">Delete</button>
          </div>
          <div class="v2-zone-actions">
            <button id="v2ZoneSave" class="v2-zone-action primary" type="button">Save</button>
            <button id="v2ZoneReset" class="v2-zone-action" type="button">Reset</button>
            <button id="v2ZoneCancel" class="v2-zone-action" type="button">Cancel</button>
          </div>
        </div>
      </section>

      <aside class="panel activity-panel">
        <div class="ph">
          <div class="ph-row">
            <div class="ph-title">Activity</div>
            <div id="v2EventCount" class="ph-count">0 today</div>
          </div>
          <div id="v2ZoneTabs" class="v2-zone-tabs" hidden></div>
          <div id="v2ClassField" class="ph-filters">
            <div id="v2ClassCtrl" class="class-chips"></div>
          </div>
        </div>
        <div id="v2NearScope" class="sr-only"></div>
        <div id="v2EventThumbs" class="events"></div>
      </aside>

      <div class="control-bar v2-timeline-area">
        <div id="v2Ruler" class="ruler" aria-hidden="true">
          <div class="grid"></div>
        </div>
        <div class="control-row">
          <div class="transport">
            <button id="v2Prev" class="t-btn" type="button" title="Previous event" aria-label="Previous event">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M9.5 3.5 4.5 7l5 3.5V3.5z" fill="currentColor"/><rect x="3" y="3.5" width="1" height="7" fill="currentColor"/></svg>
            </button>
            <button id="v2Rewind" class="t-btn v2-rewind-btn" type="button" title="Rewind 10 seconds" aria-label="Rewind 10 seconds">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M7 3A5 5 0 1 0 12 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 1L7 3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="7" y="8.5" text-anchor="middle" dominant-baseline="middle" font-size="5.5" font-weight="700" fill="currentColor" font-family="system-ui,-apple-system,sans-serif">10</text></svg>
            </button>
            <button id="v2Play" class="t-btn primary vctr-play" type="button" title="Play/Pause" aria-label="Play or pause">
              <svg data-play-icon width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3.5 2.5 9.5 6l-6 3.5v-7z" fill="currentColor"/></svg>
            </button>
            <button id="v2Next" class="t-btn" type="button" title="Next event" aria-label="Next event">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M4.5 3.5 9.5 7l-5 3.5V3.5z" fill="currentColor"/><rect x="10" y="3.5" width="1" height="7" fill="currentColor"/></svg>
            </button>
          </div>

          <div id="v2Speeds" class="speed-pills speed"></div>
          <div id="v2TimeDisp" class="time-readout"></div>

          <div class="tl-bg v2-timeline-wrap">
            <canvas id="v2Timeline" class="v2-timeline"></canvas>
            <div id="v2ThumbPreview" class="v2-thumb-preview" hidden>
              <img id="v2ThumbImg" src="" alt="">
              <div id="v2ThumbTs" class="v2-thumb-ts"></div>
            </div>
          </div>

          <div class="toggle-grp">
            <button id="v2Loop" class="toggle loop-btn active on" type="button"><span class="ind"></span>Loop</button>
            <button id="v2LiveBtn" class="toggle v2-live-btn" type="button"><span class="ind"></span>Jump live</button>
          </div>
        </div>
      </div>
    </main>
    <script src="/video2.js?v=zones-tabs-1"></script>
  </body>
</html>
